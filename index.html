<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klasemen MLBB</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', sans-serif;
    }

    body{
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#ffffff10;
        backdrop-filter: blur(10px);
        border:1px solid rgba(255,255,255,0.1);
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .title{
        text-align:center;
        color:white;
        font-size:32px;
        font-weight:700;
        padding:25px;
        background:linear-gradient(90deg,#2563eb,#7c3aed);
    }

    table{
        width:100%;
        border-collapse:collapse;
        color:white;
    }

    thead{
        background:#1e40af;
    }

    thead th{
        padding:15px;
        font-size:16px;
        text-transform:uppercase;
        letter-spacing:1px;
    }

    tbody tr{
        transition:0.3s;
    }

    tbody tr:nth-child(even){
        background:rgba(255,255,255,0.05);
    }

    tbody tr:hover{
        background:rgba(255,255,255,0.12);
    }

    tbody td{
        padding:15px;
        text-align:center;
        font-size:15px;
    }

    .rank{
        font-weight:bold;
        color:#facc15;
    }

    .top1{
        background:rgba(250,204,21,0.15);
    }

    .team{
        text-align:left;
        padding-left:20px;
        font-weight:600;
    }

    @media(max-width:768px){
        .title{
            font-size:24px;
        }

        th,td{
            font-size:13px;
            padding:10px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">
        🏆 Klasemen MLBB Tournament
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Tim</th>
                <th>Main</th>
                <th>Menang</th>
                <th>Kalah</th>
                <th>Poin</th>
            </tr>
        </thead>

        <tbody>
            <tr class="top1">
                <td class="rank">1</td>
                <td class="team">Team Alpha</td>
                <td>10</td>
                <td>8</td>
                <td>2</td>
                <td>24</td>
            </tr>

            <tr>
                <td class="rank">2</td>
                <td class="team">Team Bravo</td>
                <td>10</td>
                <td>7</td>
                <td>3</td>
                <td>21</td>
            </tr>

            <tr>
                <td class="rank">3</td>
                <td class="team">Team Charlie</td>
                <td>10</td>
                <td>6</td>
                <td>4</td>
                <td>18</td>
            </tr>

            <tr>
                <td class="rank">4</td>
                <td class="team">Team Delta</td>
                <td>10</td>
                <td>5</td>
                <td>5</td>
                <td>15</td>
            </tr>

            <tr>
                <td class="rank">5</td>
                <td class="team">Team Echo</td>
                <td>10</td>
                <td>3</td>
                <td>7</td>
                <td>9</td>
            </tr>

            <tr>
                <td class="rank">6</td>
                <td class="team">Team Foxtrot</td>
                <td>10</td>
                <td>1</td>
                <td>9</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
