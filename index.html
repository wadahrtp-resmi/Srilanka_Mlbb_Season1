<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagan Grup MLBB Indonesia</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#facc15;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.group{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
}

.group-header{
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.1);
}

th{
    background:#334155;
}

tr:hover{
    background:#475569;
}
</style>
</head>
<body>

<h1>GRUP STAGE MLBB INDONESIA</h1>

<div class="container">

    <div class="group">
        <div class="group-header">GRUP A</div>
        <table>
            <tr>
                <th>Tim</th>
                <th>Poin</th>
            </tr>
            <tr><td>ONIC</td><td>6</td></tr>
            <tr><td>EVOS</td><td>4</td></tr>
            <tr><td>DEWA</td><td>2</td></tr>
            <tr><td>REBELLION</td><td>0</td></tr>
        </table>
    </div>

    <div class="group">
        <div class="group-header">GRUP B</div>
        <table>
            <tr>
                <th>Tim</th>
                <th>Poin</th>
            </tr>
            <tr><td>RRQ</td><td>6</td></tr>
            <tr><td>AURA</td><td>3</td></tr>
            <tr><td>GEEK</td><td>3</td></tr>
            <tr><td>BIGETRON</td><td>0</td></tr>
        </table>
    </div>

    <div class="group">
        <div class="group-header">GRUP C</div>
        <table>
            <tr>
                <th>Tim</th>
                <th>Poin</th>
            </tr>
            <tr><td>NAVI</td><td>5</td></tr>
            <tr><td>ALTER EGO</td><td>4</td></tr>
            <tr><td>TEAM X</td><td>2</td></tr>
            <tr><td>TEAM Y</td><td>1</td></tr>
        </table>
    </div>

    <div class="group">
        <div class="group-header">GRUP D</div>
        <table>
            <tr>
                <th>Tim</th>
                <th>Poin</th>
            </tr>
            <tr><td>TEAM Z</td><td>6</td></tr>
            <tr><td>TEAM A</td><td>4</td></tr>
            <tr><td>TEAM B</td><td>1</td></tr>
            <tr><td>TEAM C</td><td>0</td></tr>
        </table>
    </div>

</div>

</body>
</html>
